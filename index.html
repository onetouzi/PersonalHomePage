<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="touzi的个人主页" />
    <meta name="author" content="Touzi" />
    <title>touzi - 个人主页</title>
    <link rel="icon" type="image/png" href="static/assets/favicon.png" />
    <link rel="stylesheet" href="static/css/main.css" />
</head>

<body>
    <main class="resume-shell" id="top">
        <section class="hero">
            <figure class="hero-avatar">
                <img src="static/assets/img/photo.png" alt="touzi头像" />
            </figure>
            <div class="hero-name">
                <h1 id="profileName">touzi</h1>
                <p id="profileRole">Java 后端开发工程师 / AI 算法工程师</p>
                <span class="name-rule" aria-hidden="true"></span>
            </div>
            <div class="hero-meta" id="profileContacts"></div>
            <div class="hero-school" id="profileSchool"></div>
        </section>

        <section class="section" id="overview">
            <h2>个人概览</h2>
            <p class="overview-text" id="profileSummary"></p>
        </section>

        <section class="section" id="education">
            <h2>教育经历</h2>
            <div class="timeline" id="educationList"></div>
        </section>

        <section class="section" id="projects">
            <h2>项目经验</h2>
            <div class="project-list" id="projectList"></div>
        </section>

        <section class="section" id="internships">
            <h2>实习经历</h2>
            <div class="timeline" id="internshipList"></div>
        </section>

        <section class="section" id="awards">
            <h2>奖项与荣誉</h2>
            <ul class="award-list" id="awardList"></ul>
        </section>

        <section class="section" id="skills">
            <h2>专业技能</h2>
            <div class="skill-list" id="skillList"></div>
        </section>
    </main>

    <nav class="control-dock" aria-label="页面控制">
        <a class="dock-button" href="#top" title="回到顶部">↑</a>
        <button class="dock-button" id="themeToggle" type="button">夜间</button>
        <button class="dock-button" id="langToggle" type="button">English</button>
        <button class="dock-button primary-dock" id="adminOpen" type="button">控制面板</button>
    </nav>

    <footer class="site-footer">
        <p>© Touzi 2004-2026. All Rights Reserved.</p>
        <a href="https://github.com/onetouzi" target="_blank" rel="noreferrer">github.com/onetouzi</a>
    </footer>

    <div class="modal" id="loginModal" aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
            <button class="close-button" type="button" data-close="loginModal" aria-label="关闭">×</button>
            <h2 id="loginTitle">管理员登录</h2>
            <form id="loginForm" class="form-stack">
                <label>
                    账号
                    <input id="adminUser" type="text" autocomplete="username" required />
                </label>
                <label>
                    密码
                    <input id="adminPass" type="password" autocomplete="current-password" required />
                </label>
                <p class="form-message" id="loginMessage"></p>
                <button class="primary-action full-width" type="submit">登录</button>
            </form>
        </div>
    </div>

    <aside class="admin-drawer" id="adminDrawer" aria-hidden="true">
        <div class="drawer-header">
            <div>
                <p class="eyebrow">Admin</p>
                <h2>主页内容管理</h2>
            </div>
            <button class="close-button" id="adminClose" type="button" aria-label="关闭">×</button>
        </div>
        <div class="drawer-tools">
            <button class="secondary-action" id="exportData" type="button">导出配置</button>
            <label class="secondary-action import-label">
                导入配置
                <input id="importData" type="file" accept="application/json" />
            </label>
            <button class="danger-action" id="resetData" type="button">恢复默认</button>
            <button class="primary-action" id="logoutAdmin" type="button">退出登录</button>
        </div>
        <div class="admin-sections" id="adminSections"></div>
    </aside>

    <script src="static/js/profile-data.js"></script>
    <script src="static/js/scripts.js"></script>
</body>

</html>
